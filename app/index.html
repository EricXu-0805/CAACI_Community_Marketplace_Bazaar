<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- Unknown viewport keys are ignored by older browsers, so this static
         declaration preserves the fallback without document.write/inline JS. -->
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Illini Market" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7F4EE" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#12100D" />
    <meta name="description" content="UIUC campus marketplace — buy, sell, and chat with fellow Illini students. 华人二手交易 + 校园广场" />
    <meta name="format-detection" content="telephone=no" />
    <!-- Do not hard-code resource hints to a particular Supabase project.
         Preview, staging, and migrated deployments may intentionally use a
         different VITE_SUPABASE_URL; an old preconnect would both waste a
         connection and leak visit timing to the wrong environment. -->
    <link rel="icon" type="image/svg+xml" href="/static/app-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/static/app-icon-192.png" />
    <link rel="apple-touch-icon" href="/static/app-icon-512.png" />
    <link rel="manifest" href="/static/manifest.webmanifest" />
    <title>Illini Market · UIUC 华人二手交易</title>
    <!-- Open Graph / Twitter card so a base-link share (the root URL, not a
         /share/:id deep link, which api/share.js already handles) renders a
         real preview instead of a bare URL. Relative og:image resolves
         against the page URL, so it survives a domain change. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Illini Market" />
    <meta property="og:title" content="Illini Market · UIUC 华人二手交易" />
    <meta property="og:description" content="UIUC campus marketplace — buy, sell, and chat with fellow Illini students. 华人二手交易 + 校园广场" />
    <meta property="og:image" content="/static/app-icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Illini Market · UIUC 华人二手交易" />
    <meta name="twitter:description" content="UIUC campus marketplace — buy, sell, and chat with fellow Illini students. 华人二手交易 + 校园广场" />
    <meta name="twitter:image" content="/static/app-icon-512.png" />
    <!--preload-links-->
    <!--app-context-->
  </head>
  <body>
    <div id="app"><!--app-html--></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
